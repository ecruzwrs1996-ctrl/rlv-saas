services:

  mysql:
    image: mysql:8.4

    container_name: rlv_mysql

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root_01
      MYSQL_DATABASE: rlv_saas

    ports:
       - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile

    container_name: rlv_backend

    restart: unless-stopped

    ports:
      - "8080:80"

    volumes:
      - ./backend:/var/www/html

    depends_on:
      - mysql

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile

    container_name: rlv_frontend

    restart: unless-stopped

    ports:
      - "8081:8080"

    volumes:
      - ./frontend:/app

      - /app/node_modules

    depends_on:
      - backend

volumes:

  mysql_data: